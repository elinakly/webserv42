<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>405 Method Not Allowed</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="error-page">

    <div class="background-glow glow-purple"></div>
    <div class="background-glow glow-blue"></div>

    <div class="error-container">

        <div class="error-code">405</div>

        <h1>METHOD NOT ALLOWED</h1>

        <p>
            The HTTP method you used is not supported here.<br>
            The server cat refuses your request 😼🚫
        </p>

        <img src="./images/405_method_not_allowed.png" alt="405 error">

        <a href="/" class="home-button">← Return Home</a>

    </div>

</body>
</html>
