<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>404 Not Found</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="error-page">

    <div class="background-glow glow-purple"></div>
    <div class="background-glow glow-blue"></div>

    <div class="error-container">

        <div class="error-code">404</div>

        <h1>NOT FOUND</h1>

        <p>
            The page you’re looking for does not exist.<br>
            It probably got lost in the server cat dimension 🐱
        </p>

        <img src="./images/404_not_found.png" alt="404 error">

        <a href="/" class="home-button">← Return Home</a>

    </div>

</body>
</html>
