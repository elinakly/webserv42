<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>413 Payload Too Large</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="error-page">

    <div class="background-glow glow-purple"></div>
    <div class="background-glow glow-blue"></div>

    <div class="error-container">

        <div class="error-code">413</div>

        <h1>PAYLOAD TOO LARGE</h1>

        <p>
            The request is too big for the server to handle.<br>
            Even the server cats cannot carry that much data 🐱📦
        </p>

        <img src="./images/413_payload_too_large.png" alt="413 error">

        <a href="/" class="home-button">← Return Home</a>

    </div>

</body>
</html>
